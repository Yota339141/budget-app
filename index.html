<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="記帳本">
<title>記帳本</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh}
#loading{position:fixed;inset:0;background:#f5f5f0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spin{width:36px;height:36px;border:3px solid #e0e0d8;border-top-color:#FF8C42;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#load-msg{font-size:14px;color:#888}
#load-err{font-size:13px;color:#D85A30;text-align:center;padding:0 32px;line-height:1.6;display:none}
#load-retry{padding:10px 24px;background:#FF8C42;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;display:none}
.screen{position:fixed;inset:0;background:#f5f5f0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;overflow-y:auto}
.screen.show{display:flex}
.screen h2{font-size:22px;font-weight:500;margin-bottom:8px}
.screen p{font-size:14px;color:#888;margin-bottom:24px;text-align:center}
.scard{background:#fff;border-radius:16px;padding:20px;width:100%;margin-bottom:12px}
.scard h3{font-size:12px;color:#aaa;margin-bottom:12px;font-weight:500}
.sinput{width:100%;padding:10px 12px;font-size:15px;background:#f5f5f0;border:none;border-radius:10px;margin-bottom:8px;outline:none;font-family:inherit;color:#1a1a1a;display:block}
.sbtn{width:100%;padding:12px;font-size:15px;font-weight:500;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:6px}
.sbtn.dark{background:#1a1a1a;color:#fff}
.sbtn.orange{background:#FF8C42;color:#fff}
.sbtn.outline{background:none;border:1px solid #e0e0d8;color:#888}
#app{display:none}
.hdr{background:#fff;padding:14px 16px 0;border-bottom:.5px solid #e0e0d8;position:sticky;top:0;z-index:10}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr h1{font-size:17px;font-weight:500}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;background:#FF8C42;color:#fff;padding:3px 8px;border-radius:20px}
.sync{font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px}
.sdot{width:6px;height:6px;border-radius:50%;background:#ccc;display:inline-block}
.sdot.on{background:#1D9E75}
.hbg{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:4px}
.hbg span{width:18px;height:2px;background:#1a1a1a;display:block;border-radius:2px}
.tabs{display:flex}
.tab{flex:1;padding:10px 0;font-size:12px;background:none;border:none;color:#888;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.body{padding:16px;padding-bottom:80px}
.sec{display:none}
.sec.on{display:block}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mc{background:#fff;border-radius:12px;padding:12px}
.mc label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.mc .v{font-size:16px;font-weight:500}
.v.g{color:#1D9E75}.v.r{color:#D85A30}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
.fg{margin-bottom:12px}
.fg label{font-size:12px;color:#888;display:block;margin-bottom:5px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select{width:100%;padding:10px 12px;font-size:15px;background:#f5f5f0;color:#1a1a1a;border:none;border-radius:10px;outline:none;font-family:inherit}
.tt{display:flex;border-radius:10px;overflow:hidden;background:#f5f5f0;padding:3px;gap:3px}
.tb{flex:1;padding:9px;font-size:14px;cursor:pointer;border:none;border-radius:8px;background:none;color:#888;font-family:inherit}
.tb.exp{background:#fff;color:#D85A30;font-weight:500}
.tb.inc{background:#fff;color:#1D9E75;font-weight:500}
.abtn{width:100%;padding:13px;font-size:15px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.ri{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:.5px solid #f0f0e8}
.ri:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.e{background:#D85A30}.dot.i{background:#1D9E75}
.rinfo{flex:1;min-width:0}
.rn{font-size:14px}.rm{font-size:11px;color:#aaa;margin-top:2px}
.ra{font-size:14px;font-weight:500;white-space:nowrap}
.ra.e{color:#D85A30}.ra.i{color:#1D9E75}
.xb{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:4px}
.fr2{display:flex;gap:8px;margin-bottom:12px}
.fr2 select{background:#fff}
.mn{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mn button{background:#fff;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px;font-family:inherit}
.mn span{font-size:15px;font-weight:500;flex:1;text-align:center}
.br{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bl{font-size:12px;color:#888;width:52px;flex-shrink:0;text-align:right}
.bw{flex:1;height:7px;background:#f0f0e8;border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width .4s}
.bf.e{background:#D85A30}.bf.i{background:#1D9E75}
.bv{font-size:11px;color:#888;width:68px;text-align:right;flex-shrink:0}
.st{font-size:12px;color:#aaa;font-weight:500;margin-bottom:10px}
.empty{text-align:center;padding:2rem;color:#bbb;font-size:14px}
.tl{display:flex;gap:16px;margin-bottom:10px}
.tl span{display:flex;align-items:center;gap:5px;font-size:12px;color:#888}
.tl i{width:10px;height:10px;border-radius:2px;display:inline-block}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid #f0f0e8;font-size:14px}
.srow:last-child{border-bottom:none}
.sres{padding:14px;background:#fff;border-radius:14px;font-size:14px;text-align:center;font-weight:500;line-height:2;margin-bottom:12px}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#FF8C42;color:#fff;font-size:28px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:40;box-shadow:0 4px 16px rgba(255,140,66,.4)}
.fab.show{display:flex}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end}
.ov.show{display:flex}
.qs{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%}
.qs h3{font-size:15px;font-weight:500;margin-bottom:14px}
.qa{font-size:32px;font-weight:500;width:100%;border:none;background:none;color:#1a1a1a;margin-bottom:12px;outline:none;font-family:inherit}
.qc{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.qcat{padding:7px 14px;border-radius:20px;border:1px solid #e0e0d8;background:#f5f5f0;font-size:13px;cursor:pointer;color:#888;font-family:inherit}
.qcat.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.qok{width:100%;padding:13px;font-size:15px;font-weight:500;background:#FF8C42;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:299}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center}
.modal-ov.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:28px 24px 20px;width:280px;text-align:center}
.modal-icon{font-size:40px;margin-bottom:12px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:6px}
.modal-sub{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.modal-ok{width:100%;padding:12px;font-size:15px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.curr-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:#f5f5f0;border-radius:10px;padding:4px}
.curr-sel{flex:1;background:none;border:none;font-size:14px;font-weight:500;color:#FF8C42;outline:none;font-family:inherit;cursor:pointer;padding:6px 8px}
.curr-rate{font-size:11px;color:#aaa;white-space:nowrap;padding-right:8px}
.curr-converted{font-size:12px;color:#888;margin-bottom:12px;text-align:right;min-height:18px}
.mov.show{display:block}
.menu{position:fixed;top:0;right:-290px;width:290px;height:100vh;background:#fff;z-index:300;transition:right .3s;padding:52px 20px 20px;box-shadow:-4px 0 20px rgba(0,0,0,.1);overflow-y:auto}
.menu.show{right:0}
.mclose{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#888}
.msec{margin-bottom:20px}
.msec h3{font-size:11px;color:#aaa;font-weight:500;margin-bottom:10px;letter-spacing:.5px}
.minput{width:100%;padding:9px 12px;font-size:14px;background:#f5f5f0;border:none;border-radius:10px;margin-bottom:8px;outline:none;font-family:inherit;color:#1a1a1a;display:block}
.mbtn{width:100%;padding:10px;font-size:14px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:inherit;margin-bottom:6px}
.mbtn.orange{background:#FF8C42;color:#fff}
.mbtn.out{background:none;border:1px solid #e0e0d8;color:#888}
.mbtn.danger{background:none;border:1px solid #D85A30;color:#D85A30}
.mdiv{height:.5px;background:#f0f0e8;margin:14px 0}
.minfo{font-size:13px;color:#888;line-height:1.8}
.hlist{display:flex;flex-direction:column;gap:6px}
.hitem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f5f5f0;border-radius:10px;cursor:pointer;user-select:none;-webkit-user-select:none}
.hitem:active{background:#e8e8e0}
.hitem.current{background:#FF8C421a;border:1px solid #FF8C4240}
.hitem-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.hitem-icon{font-size:14px;flex-shrink:0}
.hitem-name{font-size:14px;color:#1a1a1a;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hitem-badge{font-size:10px;color:#FF8C42;background:#FF8C421a;padding:2px 6px;border-radius:8px;flex-shrink:0}
.hitem-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;display:none}
.hlist.edit-mode .hitem-del{display:block}
.hedit-btn{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;padding:4px 0;font-family:inherit;margin-top:4px}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div id="load-msg">載入中...</div>
  <div id="load-err"></div>
  <button id="load-retry" onclick="location.reload()">重新載入</button>
</div>

<div id="screen-login" class="screen">
  <h2>📒 記帳本</h2>
  <p>輸入你的名字開始記帳</p>
  <div class="scard">
    <input class="sinput" id="login-name" placeholder="你的名字（例：Yota）">
    <button class="sbtn dark" onclick="doLogin()">開始記帳</button>
  </div>
</div>

<div class="mov" id="mov" onclick="closeMenu()"></div>
<div class="menu" id="menu">
  <button class="mclose" onclick="closeMenu()">✕</button>
  <div class="msec">
    <h3>目前狀態</h3>
    <div class="minfo" id="menu-info"></div>
  </div>
  <div class="mdiv"></div>
  <div class="msec">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <h3 style="margin-bottom:0">歷史帳本</h3>
      <button class="hedit-btn" id="hedit-btn" onclick="toggleEditMode()">長按可刪除</button>
    </div>
    <div class="hlist" id="hlist"></div>
  </div>
  <div class="mdiv"></div>
  <div class="msec">
    <h3>單人帳本</h3>
    <input class="minput" id="m-solo" placeholder="帳本名稱">
    <button class="mbtn out" onclick="mSolo()">切換／新增帳本</button>
  </div>
  <div class="mdiv"></div>
  <div class="msec" id="m-multi-sec">
    <h3>多人共帳</h3>
    <input class="minput" id="m-cname" placeholder="你的名字">
    <input class="minput" id="m-rname" placeholder="房間名稱（例：日本旅遊）">
    <button class="mbtn orange" onclick="mCreate()">＋ 建立新房間</button>
    <div style="text-align:center;font-size:12px;color:#ccc;margin:8px 0">或</div>
    <input class="minput" id="m-jname" placeholder="你的名字">
    <input class="minput" id="m-jcode" placeholder="4碼代碼" maxlength="4" style="text-transform:uppercase;letter-spacing:6px;text-align:center">
    <button class="mbtn out" onclick="mJoin()">加入房間</button>
  </div>
  <div id="m-leave-sec" style="display:none">
    <div class="mdiv"></div>
    <button class="mbtn danger" onclick="mLeave()">離開多人房間</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <h1>記帳本</h1>
      <div class="hdr-right">
        <div class="sync"><span class="sdot" id="sdot"></span><span id="slbl">連線中</span></div>
        <span class="badge" id="badge">個人</span>
        <button class="hbg" onclick="openMenu()"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="goTab('record')">記帳</button>
      <button class="tab" onclick="goTab('list')">明細</button>
      <button class="tab" onclick="goTab('analysis')">月分析</button>
      <button class="tab" onclick="goTab('split')">分帳</button>
      <button class="tab" onclick="goTab('settings')">設定</button>
    </div>
  </div>
  <div class="body">

    <div id="sec-record" class="sec on">
      <div class="mg" id="summary"></div>
      <div class="card">
        <div class="fg">
          <label>類型</label>
          <div class="tt">
            <button class="tb exp" id="t-exp" onclick="setType('e')">支出</button>
            <button class="tb" id="t-inc" onclick="setType('i')">收入</button>
          </div>
        </div>
        <div class="fg">
          <label>幣別與金額</label>
          <div class="curr-row">
            <select class="curr-sel" id="inp-curr" onchange="onCurrChange()">
              <option value="TWD">🇹🇼 TWD</option>
              <option value="JPY">🇯🇵 JPY</option>
              <option value="USD">🇺🇸 USD</option>
              <option value="EUR">🇪🇺 EUR</option>
              <option value="GBP">🇬🇧 GBP</option>
              <option value="KRW">🇰🇷 KRW</option>
              <option value="HKD">🇭🇰 HKD</option>
              <option value="THB">🇹🇭 THB</option>
              <option value="IDR">🇮🇩 IDR</option>
            </select>
            <span class="curr-rate" id="curr-rate-label"></span>
          </div>
          <input type="number" id="inp-amt" placeholder="0" inputmode="numeric" oninput="onAmtInput()">
          <div class="curr-converted" id="curr-converted"></div>
        </div>
        <div class="fr">
          <div class="fg"><label>分類</label><select id="inp-cat"></select></div>
          <div class="fg"><label>日期</label><input type="date" id="inp-date"></div>
        </div>
        <div class="fg"><label>備註</label><input type="text" id="inp-note" placeholder="選填"></div>
        <button class="abtn" onclick="addRec()">新增</button>
      </div>
    </div>

    <div id="sec-list" class="sec">
      <div class="fr2">
        <select id="f-month" onchange="renderList()"></select>
        <select id="f-type" onchange="renderList()"><option value="all">全部</option><option value="e">支出</option><option value="i">收入</option></select>
      </div>
      <div class="card"><div id="rec-list"></div></div>
    </div>

    <div id="sec-analysis" class="sec">
      <div class="mn">
        <button onclick="shiftM(-1)">←</button>
        <span id="a-month"></span>
        <button onclick="shiftM(1)">→</button>
      </div>
      <div class="mg" id="a-summary"></div>
      <div class="card"><div class="st">支出分類</div><div id="exp-bars"></div></div>
      <div class="card"><div class="st">收入來源</div><div id="inc-bars"></div></div>
      <div class="card">
        <div class="st">近 6 個月趨勢</div>
        <div class="tl"><span><i style="background:#1D9E75"></i>收入</span><span><i style="background:#D85A30"></i>支出</span></div>
        <div style="position:relative;width:100%;height:180px"><canvas id="chart"></canvas></div>
      </div>
    </div>

    <div id="sec-split" class="sec"><div id="split-body"></div></div>

    <div id="sec-settings" class="sec">
      <div class="card">
        <div class="st">固定月薪</div>
        <div style="display:flex;align-items:center;gap:10px">
          <label style="font-size:13px;color:#888;white-space:nowrap">每月 NT$</label>
          <input type="number" id="salary" placeholder="0" inputmode="numeric" style="max-width:160px" oninput="saveSalary()">
        </div>
      </div>
      <div class="card"><div class="st">帳本資訊</div><div id="room-info" style="font-size:14px;color:#888;line-height:2"></div></div>
    </div>

  </div>
</div>

<!-- 記帳成功 Modal -->
<div class="modal-ov" id="success-modal">
  <div class="modal">
    <div class="modal-icon">✅</div>
    <div class="modal-title">記帳成功</div>
    <div class="modal-sub" id="success-detail"></div>
    <button class="modal-ok" onclick="closeModal()">確認</button>
  </div>
</div>

<button class="fab" id="fab" onclick="openQ()">+</button>
<div class="ov" id="qov" onclick="closeQ(event)">
  <div class="qs">
    <h3>快速記帳（支出）</h3>
    <input class="qa" type="number" id="q-amt" placeholder="輸入金額" inputmode="numeric">
    <div class="qc" id="q-cats"></div>
    <button class="qok" onclick="addQ()">確認新增</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// 錯誤處理
function showErr(msg) {
  document.querySelector('.spin').style.display='none';
  document.getElementById('load-msg').style.display='none';
  document.getElementById('load-err').style.display='block';
  document.getElementById('load-err').textContent=msg;
  document.getElementById('load-retry').style.display='block';
}
window.onerror=function(m,s,l){showErr('錯誤('+l+'):'+m);return true};
window.onunhandledrejection=function(e){showErr('錯誤:'+(e.reason&&e.reason.message||e.reason))};

// Firebase
firebase.initializeApp({
  apiKey:"AIzaSyAExM8OPwQ8iM-sNWk5q1B4g64kflxivHU",
  authDomain:"budget-app-5bed4.firebaseapp.com",
  databaseURL:"https://budget-app-5bed4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"budget-app-5bed4",
  storageBucket:"budget-app-5bed4.firebasestorage.app",
  messagingSenderId:"526050928979",
  appId:"1:526050928979:web:347401d2d82603808cd9a6"
});
const db=firebase.database();

// 常數
const EC=['餐飲','購物','交通','娛樂','醫療','住房','水電','通訊','保險','其他'];
const IC=['薪資','獎金','兼職','投資','其他收入'];
const TABS=['record','list','analysis','split','settings'];

// 狀態
let uname='',roomId='',roomName='',isMulti=false;
let recs={},dbRef=null,curType='e',aMonth='',qCat='購物',chart=null;

// 工具
const fmt=n=>'NT$'+Math.round(n).toLocaleString();
const mk=d=>d.slice(0,7);
const nowM=()=>new Date().toISOString().slice(0,7);
const sal=()=>parseInt(localStorage.getItem('sal'))||0;
const arr=()=>Object.entries(recs).map(([id,r])=>({...r,id}));
const genCode=()=>Math.random().toString(36).substring(2,6).toUpperCase();

// 歷史帳本管理
const HISTORY_KEY = 'acct_history';
let editMode = false;
let longPressTimer = null;

function getHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch{ return []; }
}

function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

function addToHistory(name, rid, type){
  const h = getHistory();
  // 移除舊的同名記錄
  const filtered = h.filter(x => x.rid !== rid);
  // 加到最前面
  filtered.unshift({ name, rid, type, ts: Date.now() });
  // 最多保留 20 筆
  saveHistory(filtered.slice(0, 20));
}

function removeFromHistory(rid){
  saveHistory(getHistory().filter(x => x.rid !== rid));
  renderHistory();
}

function toggleEditMode(){
  editMode = !editMode;
  const list = document.getElementById('hlist');
  if(list) list.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('hedit-btn');
  if(btn) btn.textContent = editMode ? '完成' : '長按可刪除';
}

function renderHistory(){
  const h = getHistory();
  const el = document.getElementById('hlist');
  if(!el) return;
  if(!h.length){ el.innerHTML='<div style="font-size:13px;color:#bbb;text-align:center;padding:8px">尚無歷史帳本</div>'; return; }
  el.innerHTML = h.map(item => {
    const isCurrent = item.rid === roomId;
    const icon = item.type === 'multi' ? '👥' : '👤';
    return `<div class="hitem ${isCurrent?'current':''}" 
      onclick="switchToHistory('${item.rid}','${item.name}','${item.type}')"
      oncontextmenu="return false">
      <div class="hitem-left">
        <span class="hitem-icon">${icon}</span>
        <span class="hitem-name">${item.name}</span>
        ${isCurrent?'<span class="hitem-badge">目前</span>':''}
      </div>
      <button class="hitem-del" onclick="event.stopPropagation();removeFromHistory('${item.rid}')">✕</button>
    </div>`;
  }).join('');

  // 長按刪除
  el.querySelectorAll('.hitem').forEach(item => {
    item.addEventListener('touchstart', () => {
      longPressTimer = setTimeout(() => {
        editMode = true;
        el.classList.add('edit-mode');
        document.getElementById('hedit-btn').textContent = '完成';
      }, 600);
    });
    item.addEventListener('touchend', () => clearTimeout(longPressTimer));
    item.addEventListener('touchmove', () => clearTimeout(longPressTimer));
  });
}

function switchToHistory(rid, name, type){
  if(editMode) return;
  if(rid === roomId){ closeMenu(); return; }
  if(dbRef) dbRef.off('value');
  recs = {};
  if(type === 'multi'){
    // 切換到多人房間
    isMulti = true; roomId = rid; roomName = name;
    // 從 localStorage 找 userName
    uname = localStorage.getItem('lu') || uname;
    localStorage.setItem('lm','multi');
    localStorage.setItem('lrid', rid);
    localStorage.setItem('lrn', name);
    dbRef = db.ref('rooms/'+rid+'/records');
  } else {
    // 切換到單人帳本
    isMulti = false; roomId = rid; roomName = '';
    const nameFromRid = rid.replace(/^solo_/,'').replace(/_\d+$/,'');
    uname = nameFromRid || localStorage.getItem('lu') || uname;
    localStorage.setItem('lu', uname);
    localStorage.setItem('lm','solo');
    localStorage.removeItem('lrid');
    dbRef = db.ref('rooms/'+rid+'/records');
  }
  document.getElementById('badge').textContent = isMulti ? (roomName||roomId) : '個人';
  document.getElementById('room-info').innerHTML = isMulti
    ? `房間：<strong>${roomName}</strong><br>代碼：${roomId}<br>名字：${uname}`
    : `個人 · ${uname}`;
  closeMenu();
  listen();
}

// 匯率
let rates={TWD:1};
const CURR_NAMES={TWD:'TWD',JPY:'JPY',USD:'USD',EUR:'EUR',GBP:'GBP',KRW:'KRW',HKD:'HKD',THB:'THB',IDR:'IDR'};

async function fetchRates(){
  try{
    // 用 TWD 為目標，取得 1 外幣 = X TWD
    const res=await fetch('https://open.er-api.com/v6/latest/USD');
    const data=await res.json();
    if(data&&data.rates&&data.rates.TWD){
      const usdToTwd=data.rates.TWD; // 1 USD = X TWD
      Object.keys(CURR_NAMES).forEach(c=>{
        if(c==='TWD') rates[c]=1;
        else if(data.rates[c]){
          // 1 外幣 = (1/data.rates[c]) USD = (1/data.rates[c])*usdToTwd TWD
          rates[c]=usdToTwd/data.rates[c];
        }
      });
      updateRateLabel();
    }
  }catch(e){console.log('匯率載入失敗',e);}
}

function updateRateLabel(){
  const curr=document.getElementById('inp-curr')?document.getElementById('inp-curr').value:'TWD';
  const el=document.getElementById('curr-rate-label');
  if(!el) return;
  if(curr==='TWD'){el.textContent='';}
  else{const r=rates[curr];el.textContent=r?`1${curr}≈${r.toFixed(2)}元`:'';}
}

function onCurrChange(){
  updateRateLabel();
  onAmtInput();
}

function onAmtInput(){
  const curr=document.getElementById('inp-curr').value;
  const amt=parseFloat(document.getElementById('inp-amt').value);
  const el=document.getElementById('curr-converted');
  if(!el) return;
  if(curr==='TWD'||!amt||isNaN(amt)){el.textContent='';return;}
  const rate=rates[curr]||1;
  // 1 外幣 = rate 台幣，所以 amt 外幣 = amt * rate 台幣
  el.textContent=`≈ ${fmt(Math.round(amt*rate))} TWD`;
}

// DB 監聽

// 自動登入
window.addEventListener('load',()=>{
  const lu=localStorage.getItem('lu');
  const lm=localStorage.getItem('lm');
  const lrid=localStorage.getItem('lrid');
  const lrn=localStorage.getItem('lrn');

  if(lu && lm==='multi' && lrid){
    uname=lu; isMulti=true; roomId=lrid; roomName=lrn||lrid;
    dbRef=db.ref('rooms/'+roomId+'/records');
    // 確認房間存在
    db.ref('rooms/'+roomId+'/meta').once('value').then(()=>{
      listen(); enterApp();
    }).catch(()=>{
      localStorage.setItem('lm','solo');
      localStorage.removeItem('lrid');
      doSolo(lu);
    });
  } else if(lu){
    doSolo(lu);
  } else {
    document.getElementById('loading').style.display='none';
    document.getElementById('screen-login').classList.add('show');
  }

  // 8秒保險
  setTimeout(()=>{
    if(document.getElementById('loading').style.display!=='none'){
      localStorage.setItem('lm','solo');
      localStorage.removeItem('lrid');
      if(lu) doSolo(lu);
      else{
        document.getElementById('loading').style.display='none';
        document.getElementById('screen-login').classList.add('show');
      }
    }
  },8000);
});

// 記帳
function setType(t){
  curType=t;
  document.getElementById('t-exp').className='tb'+(t==='e'?' exp':'');
  document.getElementById('t-inc').className='tb'+(t==='i'?' inc':'');
  setCat();
}
function setCat(){
  document.getElementById('inp-cat').innerHTML=(curType==='e'?EC:IC).map(c=>`<option>${c}</option>`).join('');
}
function addRec(){
  const rawAmt=parseFloat(document.getElementById('inp-amt').value);
  if(!rawAmt||rawAmt<=0){alert('請輸入金額');return;}
  const date=document.getElementById('inp-date').value;
  if(!date){alert('請選擇日期');return;}
  const curr=document.getElementById('inp-curr').value;
  const rate=rates[curr]||1;
  // 外幣 * rate = 台幣
  const amt=curr==='TWD'?rawAmt:Math.round(rawAmt*rate);
  const cat=document.getElementById('inp-cat').value;
  const note=document.getElementById('inp-note').value.trim();
  dbRef.push({type:curType,amount:amt,cat,date,note,user:uname,ts:Date.now(),origAmt:rawAmt,origCurr:curr});
  const label=curr==='TWD'?fmt(amt):`${curr} ${rawAmt.toLocaleString()} → ${fmt(amt)}`;
  document.getElementById('success-detail').innerHTML=`<strong>${cat}</strong><br>${label}<br>${date}`;
  document.getElementById('success-modal').classList.add('show');
  document.getElementById('inp-amt').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('curr-converted').textContent='';
}
function closeModal(){document.getElementById('success-modal').classList.remove('show');}
function delRec(id){db.ref('rooms/'+roomId+'/records/'+id).remove();}

// 畫面
function drawSummary(){
  const m=nowM(),a=arr(),s=sal();
  const mr=a.filter(r=>mk(r.date)===m);
  let inc=mr.filter(r=>r.type==='i').reduce((x,r)=>x+r.amount,0);
  let exp=mr.filter(r=>r.type==='e').reduce((x,r)=>x+r.amount,0);
  if(s) inc=Math.max(inc,s);
  const bal=inc-exp;
  document.getElementById('summary').innerHTML=`
    <div class="mc"><label>本月收入</label><div class="v g">${fmt(inc)}</div></div>
    <div class="mc"><label>本月支出</label><div class="v r">${fmt(exp)}</div></div>
    <div class="mc"><label>結餘</label><div class="v ${bal>=0?'g':'r'}">${fmt(bal)}</div></div>`;
}

function fillMonths(){
  const ms=new Set(arr().map(r=>mk(r.date))); ms.add(nowM());
  const s=document.getElementById('f-month'),cur=s.value||nowM();
  s.innerHTML=[...ms].sort().reverse().map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m.replace('-','年')}月</option>`).join('');
}

function renderList(){
  const fm=document.getElementById('f-month').value;
  const ft=document.getElementById('f-type').value;
  let list=arr().filter(r=>mk(r.date)===fm);
  if(ft!=='all') list=list.filter(r=>r.type===ft);
  list.sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('rec-list');
  if(!list.length){el.innerHTML='<div class="empty">沒有記錄</div>';return;}
  el.innerHTML=list.map(r=>`
    <div class="ri">
      <div class="dot ${r.type}"></div>
      <div class="rinfo">
        <div class="rn">${r.cat}${r.note?' · '+r.note:''}${isMulti?` <span style="font-size:10px;color:#FF8C42">${r.user}</span>`:''}</div>
        <div class="rm">${r.date}</div>
      </div>
      <div class="ra ${r.type}">${r.type==='i'?'+':'-'}${fmt(r.amount)}</div>
      <button class="xb" onclick="delRec('${r.id}')">✕</button>
    </div>`).join('');
}

function drawAnalysis(){
  const a=arr(),s=sal(),m=aMonth;
  document.getElementById('a-month').textContent=m.replace('-','年')+'月';
  const mr=a.filter(r=>mk(r.date)===m);
  let inc=mr.filter(r=>r.type==='i').reduce((x,r)=>x+r.amount,0);
  let exp=mr.filter(r=>r.type==='e').reduce((x,r)=>x+r.amount,0);
  if(s&&m===nowM()) inc=Math.max(inc,s);
  const bal=inc-exp,rate=inc>0?Math.round(bal/inc*100):0;
  document.getElementById('a-summary').innerHTML=`
    <div class="mc"><label>收入</label><div class="v g">${fmt(inc)}</div></div>
    <div class="mc"><label>支出</label><div class="v r">${fmt(exp)}</div></div>
    <div class="mc"><label>儲蓄率</label><div class="v ${rate>=0?'g':'r'}">${rate}%</div></div>`;
  drawBars('e',mr,'exp-bars'); drawBars('i',mr,'inc-bars'); drawChart(a,s);
}

function drawBars(t,recs,elId){
  const cats={};
  recs.filter(r=>r.type===t).forEach(r=>{cats[r.cat]=(cats[r.cat]||0)+r.amount;});
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,e)=>s+e[1],0);
  const el=document.getElementById(elId);
  if(!sorted.length){el.innerHTML='<div class="empty" style="padding:.5rem">無記錄</div>';return;}
  el.innerHTML=sorted.map(([c,a])=>`
    <div class="br">
      <div class="bl">${c}</div>
      <div class="bw"><div class="bf ${t}" style="width:${Math.round(a/total*100)}%"></div></div>
      <div class="bv">${fmt(a)}</div>
    </div>`).join('');
}

function drawChart(a,s){
  const ms=[],d=new Date();
  for(let i=5;i>=0;i--){const x=new Date(d.getFullYear(),d.getMonth()-i,1);ms.push(x.toISOString().slice(0,7));}
  const incs=ms.map(m=>{let v=a.filter(r=>r.type==='i'&&mk(r.date)===m).reduce((x,r)=>x+r.amount,0);if(s&&m===nowM())v=Math.max(v,s);return v;});
  const exps=ms.map(m=>a.filter(r=>r.type==='e'&&mk(r.date)===m).reduce((x,r)=>x+r.amount,0));
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('chart'),{type:'line',data:{labels:ms.map(m=>m.slice(5)+'月'),datasets:[
    {label:'收入',data:incs,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,.08)',tension:.3,pointRadius:4},
    {label:'支出',data:exps,borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,.08)',tension:.3,pointRadius:4}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{y:{ticks:{callback:v=>'NT$'+v.toLocaleString(),font:{size:10}},grid:{color:'rgba(0,0,0,.06)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
}

function drawSplit(){
  const el=document.getElementById('split-body');
  if(!isMulti){el.innerHTML='<div class="empty">分帳需要多人房間</div>';return;}
  const a=arr().filter(r=>mk(r.date)===nowM()&&r.type==='e');
  const users={};
  a.forEach(r=>{users[r.user]=(users[r.user]||0)+r.amount;});
  const ul=Object.keys(users),total=Object.values(users).reduce((s,v)=>s+v,0),avg=ul.length?total/ul.length:0;
  const rows=ul.map(u=>`<div class="srow"><span>${u}</span><span class="r">${fmt(users[u])}</span></div>`).join('');
  const res=[];
  ul.forEach(u=>{const d=users[u]-avg;if(d<-10)res.push(`${u} 應收 ${fmt(Math.abs(d))}`);else if(d>10)res.push(`${u} 應付 ${fmt(d)}`);});
  el.innerHTML=`
    <div class="card">
      <div class="st">${nowM().replace('-','年')}月 共同支出</div>
      ${rows||'<div class="empty" style="padding:.5rem">無記錄</div>'}
      <div class="srow"><span>總計</span><span style="font-weight:500">${fmt(total)}</span></div>
      <div class="srow"><span>每人平均</span><span>${fmt(avg)}</span></div>
    </div>
    ${res.length?`<div class="sres">💰 結算<br>${res.join('<br>')}</div>`:''}`;
}

function shiftM(d){const dt=new Date(aMonth+'-01');dt.setMonth(dt.getMonth()+d);aMonth=dt.toISOString().slice(0,7);drawAnalysis();}

function goTab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.sec').forEach(e=>e.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
  TABS.forEach((n,i)=>{if(n===t)document.querySelectorAll('.tab')[i].classList.add('on');});
  if(t==='list'){fillMonths();renderList();}
  if(t==='analysis') drawAnalysis();
  if(t==='split') drawSplit();
  history.pushState({tab:t},'','');
}

function redraw(){
  drawSummary();
  const a=document.querySelector('.sec.on');
  if(!a) return;
  const t=a.id.replace('sec-','');
  if(t==='list'){fillMonths();renderList();}
  if(t==='analysis') drawAnalysis();
  if(t==='split') drawSplit();
}

function mJoin(){

  uname=n;isMulti=true;roomId=code;
  localStorage.setItem('lu',n);localStorage.setItem('lm','multi');localStorage.setItem('lrid',code);

    roomName=s.val()||code;

    document.getElementById('badge').textContent=roomName;
    document.getElementById('room-info').innerHTML=`房間：<strong>${roomName}</strong><br>代碼：${roomId}<br>名字：${uname}`;
  });

function mLeave(){
  if(dbRef) dbRef.off('value');
  recs={};isMulti=false;
  localStorage.setItem('lm','solo');
  localStorage.removeItem('lrid');localStorage.removeItem('lrn');
  closeMenu();doSolo(uname);
}
