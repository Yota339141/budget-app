<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳本">
<title>記帳本</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#f5f5f0;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh}
.hidden{display:none!important}
/* 載入 */
#loading-screen{position:fixed;inset:0;background:#f5f5f0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid #e0e0d8;border-top-color:#FF8C42;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{font-size:14px;color:#888}
#loading-err{font-size:13px;color:#D85A30;text-align:center;padding:0 32px;line-height:1.6}
#loading-retry{padding:10px 24px;background:#FF8C42;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit}
/* 首頁 */
.room-screen{position:fixed;inset:0;background:#f5f5f0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;overflow-y:auto}
.room-screen h2{font-size:22px;font-weight:500;margin-bottom:8px}
.room-screen p{font-size:14px;color:#888;margin-bottom:24px;text-align:center}
.room-card{background:#fff;border-radius:16px;padding:20px;width:100%;margin-bottom:12px}
.room-card h3{font-size:13px;color:#aaa;margin-bottom:12px;font-weight:500}
.room-input{width:100%;padding:10px 12px;font-size:15px;background:#f5f5f0;border:none;border-radius:10px;margin-bottom:10px;outline:none;font-family:inherit;color:#1a1a1a}
.room-btn{width:100%;padding:13px;font-size:15px;font-weight:500;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:6px}
.room-btn.primary{background:#1a1a1a;color:#fff}
/* header */
.header{background:#fff;padding:16px 20px 0;border-bottom:.5px solid #e0e0d8;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header h1{font-size:18px;font-weight:500}
.room-badge{font-size:11px;background:#FF8C42;color:#fff;padding:3px 8px;border-radius:20px}
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:4px}
.hamburger span{width:18px;height:2px;background:#1a1a1a;display:block;border-radius:2px}
.tab-bar{display:flex}
.tab{flex:1;padding:10px 0;font-size:12px;background:none;border:none;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.content{padding:16px;padding-bottom:80px}
.section{display:none}
.section.active{display:block}
/* 側邊選單 */
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:299}
.menu-overlay.open{display:block}
.side-menu{position:fixed;top:0;right:-290px;width:290px;height:100vh;background:#fff;z-index:300;transition:right .3s;padding:56px 20px 20px;box-shadow:-4px 0 20px rgba(0,0,0,.1);overflow-y:auto}
.side-menu.open{right:0}
.menu-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#888}
.menu-sec{margin-bottom:20px}
.menu-sec h3{font-size:11px;color:#aaa;font-weight:500;margin-bottom:10px;letter-spacing:.5px}
.menu-input{width:100%;padding:9px 12px;font-size:14px;background:#f5f5f0;border:none;border-radius:10px;margin-bottom:8px;outline:none;font-family:inherit;color:#1a1a1a}
.menu-btn{width:100%;padding:10px;font-size:14px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:inherit;margin-bottom:6px}
.menu-btn.orange{background:#FF8C42;color:#fff}
.menu-btn.outline{background:none;border:1px solid #e0e0d8;color:#888}
.menu-btn.danger{background:none;border:1px solid #D85A30;color:#D85A30}
.menu-divider{height:.5px;background:#f0f0e8;margin:14px 0}
.menu-info{font-size:13px;color:#888;line-height:1.8}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sync-dot.online{background:#1D9E75}
/* 記帳UI */
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.metric{background:#fff;border-radius:12px;padding:14px 12px}
.metric label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.metric .val{font-size:17px;font-weight:500}
.green{color:#1D9E75}.red{color:#D85A30}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:#888;display:block;margin-bottom:5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select{width:100%;padding:10px 12px;font-size:15px;background:#f5f5f0;color:#1a1a1a;border:none;border-radius:10px;outline:none;font-family:inherit}
.type-toggle{display:flex;border-radius:10px;overflow:hidden;background:#f5f5f0;padding:3px;gap:3px}
.type-btn{flex:1;padding:9px;font-size:14px;cursor:pointer;border:none;border-radius:8px;background:none;color:#888;font-family:inherit}
.type-btn.ae{background:#fff;color:#D85A30;font-weight:500}
.type-btn.ai{background:#fff;color:#1D9E75;font-weight:500}
.add-btn{width:100%;padding:13px;font-size:15px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.record-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid #f0f0e8}
.record-item:last-child{border-bottom:none}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rdot.income{background:#1D9E75}.rdot.expense{background:#D85A30}
.rinfo{flex:1;min-width:0}
.rinfo .name{font-size:14px}
.rinfo .meta{font-size:11px;color:#aaa;margin-top:2px}
.ramt{font-size:14px;font-weight:500;white-space:nowrap}
.ramt.income{color:#1D9E75}.ramt.expense{color:#D85A30}
.del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:4px 6px}
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-row select{background:#fff}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.month-nav button{background:#fff;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:15px}
.month-nav span{font-size:15px;font-weight:500;flex:1;text-align:center}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-label{font-size:12px;color:#888;width:52px;flex-shrink:0;text-align:right}
.bar-wrap{flex:1;height:7px;background:#f0f0e8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-fill.expense{background:#D85A30}.bar-fill.income{background:#1D9E75}
.bar-val{font-size:11px;color:#888;width:68px;text-align:right;flex-shrink:0}
.sec-title{font-size:12px;color:#aaa;font-weight:500;margin-bottom:10px}
.empty{text-align:center;padding:2rem;color:#bbb;font-size:14px}
.tlegend{display:flex;gap:16px;margin-bottom:10px}
.tlegend span{display:flex;align-items:center;gap:5px;font-size:12px;color:#888}
.tlegend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.split-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid #f0f0e8;font-size:14px}
.split-row:last-child{border-bottom:none}
.split-result{padding:14px;background:#fff;border-radius:14px;font-size:14px;text-align:center;font-weight:500;line-height:2;margin-bottom:12px}
/* 快速記帳 */
.quick-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#FF8C42;color:#fff;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:40;box-shadow:0 4px 16px rgba(255,140,66,.4)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end}
.overlay.open{display:flex}
.quick-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%}
.quick-sheet h3{font-size:15px;font-weight:500;margin-bottom:14px}
.qamt{font-size:32px;font-weight:500;width:100%;border:none;background:none;color:#1a1a1a;margin-bottom:12px;outline:none;font-family:inherit}
.qcats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.qcat{padding:7px 14px;border-radius:20px;border:1px solid #e0e0d8;background:#f5f5f0;font-size:13px;cursor:pointer;color:#888;font-family:inherit}
.qcat.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.qconfirm{width:100%;padding:14px;font-size:15px;font-weight:500;background:#FF8C42;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div id="loading-msg">載入中...</div>
  <div id="loading-err" class="hidden"></div>
  <button id="loading-retry" class="hidden" onclick="location.reload()">重新載入</button>
</div>

<div id="room-screen" class="room-screen hidden">
  <h2>📒 記帳本</h2>
  <p>輸入你的名字開始記帳</p>
  <div class="room-card">
    <input class="room-input" id="solo-name" placeholder="你的名字（例：Yota）">
    <button class="room-btn primary" onclick="startSolo()">開始記帳</button>
  </div>
</div>

<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
<div class="side-menu" id="side-menu">
  <button class="menu-close" onclick="closeMenu()">✕</button>
  <div class="menu-sec">
    <h3>目前狀態</h3>
    <div class="menu-info" id="menu-status"></div>
  </div>
  <div class="menu-divider"></div>
  <div class="menu-sec">
    <h3>單人帳本</h3>
    <input class="menu-input" id="menu-solo-name" placeholder="帳本名稱">
    <button class="menu-btn outline" onclick="menuSwitchSolo()">切換／新增帳本</button>
  </div>
  <div class="menu-divider"></div>
  <div class="menu-sec" id="menu-multi-sec">
    <h3>多人共帳</h3>
    <input class="menu-input" id="menu-create-name" placeholder="你的名字">
    <button class="menu-btn orange" onclick="menuCreateRoom()">＋ 建立新房間</button>
    <div style="text-align:center;font-size:12px;color:#ccc;margin:8px 0">或</div>
    <input class="menu-input" id="menu-join-name" placeholder="你的名字">
    <input class="menu-input" id="menu-join-code" placeholder="4碼代碼" maxlength="4" style="text-transform:uppercase;letter-spacing:6px;text-align:center">
    <button class="menu-btn outline" onclick="menuJoinRoom()">加入房間</button>
  </div>
  <div id="menu-leave-sec" class="hidden">
    <div class="menu-divider"></div>
    <button class="menu-btn danger" onclick="leaveRoom()">離開多人房間</button>
  </div>
</div>

<div id="main-app" class="hidden">
  <div class="header">
    <div class="header-top">
      <h1>記帳本</h1>
      <div style="display:flex;align-items:center;gap:10px">
        <span><span class="sync-dot" id="sync-dot"></span><span id="sync-label" style="font-size:11px;color:#aaa">連線中</span></span>
        <span class="room-badge" id="room-badge">個人</span>
        <button class="hamburger" onclick="openMenu()" aria-label="選單">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('record')">記帳</button>
      <button class="tab" onclick="switchTab('list')">明細</button>
      <button class="tab" onclick="switchTab('analysis')">月分析</button>
      <button class="tab" onclick="switchTab('split')">分帳</button>
      <button class="tab" onclick="switchTab('settings')">設定</button>
    </div>
  </div>
  <div class="content">

    <div id="tab-record" class="section active">
      <div class="metric-grid" id="summary-metrics"></div>
      <div class="card">
        <div class="form-group">
          <label>類型</label>
          <div class="type-toggle">
            <button class="type-btn ae" id="btn-expense" onclick="setType('expense')">支出</button>
            <button class="type-btn" id="btn-income" onclick="setType('income')">收入</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>金額（NT$）</label><input type="number" id="inp-amount" placeholder="0" inputmode="numeric"></div>
          <div class="form-group"><label>分類</label><select id="inp-cat"></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>日期</label><input type="date" id="inp-date"></div>
          <div class="form-group"><label>備註</label><input type="text" id="inp-note" placeholder="選填"></div>
        </div>
        <button class="add-btn" onclick="addRecord()">新增</button>
      </div>
    </div>

    <div id="tab-list" class="section">
      <div class="filter-row">
        <select id="filter-month" onchange="renderList()"></select>
        <select id="filter-type" onchange="renderList()"><option value="all">全部</option><option value="expense">支出</option><option value="income">收入</option></select>
      </div>
      <div class="card"><div id="record-list"></div></div>
    </div>

    <div id="tab-analysis" class="section">
      <div class="month-nav">
        <button onclick="shiftMonth(-1)">←</button>
        <span id="analysis-month-label"></span>
        <button onclick="shiftMonth(1)">→</button>
      </div>
      <div class="metric-grid" id="analysis-metrics"></div>
      <div class="card"><div class="sec-title">支出分類</div><div id="expense-bars"></div></div>
      <div class="card"><div class="sec-title">收入來源</div><div id="income-bars"></div></div>
      <div class="card">
        <div class="sec-title">近 6 個月趨勢</div>
        <div class="tlegend"><span><i style="background:#1D9E75"></i>收入</span><span><i style="background:#D85A30"></i>支出</span></div>
        <div style="position:relative;width:100%;height:180px"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>

    <div id="tab-split" class="section"><div id="split-content"></div></div>

    <div id="tab-settings" class="section">
      <div class="card">
        <div class="sec-title">固定月薪</div>
        <div style="display:flex;align-items:center;gap:10px">
          <label style="font-size:13px;color:#888;white-space:nowrap">每月薪資 NT$</label>
          <input type="number" id="salary-input" placeholder="0" inputmode="numeric" style="max-width:160px" oninput="saveSalary()">
        </div>
      </div>
      <div class="card"><div class="sec-title">帳本資訊</div><div id="room-info-card" style="font-size:14px;color:#888;line-height:2"></div></div>
    </div>

  </div>
</div>

<button class="quick-fab hidden" id="quick-fab" onclick="openQuick()" aria-label="快速記帳">+</button>
<div class="overlay" id="quick-overlay" onclick="closeQuick(event)">
  <div class="quick-sheet">
    <h3>快速記帳（支出）</h3>
    <input class="qamt" type="number" id="quick-amount" placeholder="輸入金額" inputmode="numeric">
    <div class="qcats" id="quick-cats"></div>
    <button class="qconfirm" onclick="confirmQuick()">確認新增</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const ECATS = ['餐飲','購物','交通','娛樂','醫療','住房','水電','通訊','保險','其他'];
const ICATS = ['薪資','獎金','兼職','投資','其他收入'];
const TABS = ['record','list','analysis','split','settings'];

let curType = 'expense', aMonth = '', tChart = null, qCat = '購物';
let roomId = '', userName = '', isMulti = false;
let records = {}, dbRef = null;

// Firebase 初始化
firebase.initializeApp({
  apiKey: "AIzaSyAExM8OPwQ8iM-sNWk5q1B4g64kflxivHU",
  authDomain: "budget-app-5bed4.firebaseapp.com",
  databaseURL: "https://budget-app-5bed4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "budget-app-5bed4",
  storageBucket: "budget-app-5bed4.firebasestorage.app",
  messagingSenderId: "526050928979",
  appId: "1:526050928979:web:347401d2d82603808cd9a6"
});
const db = firebase.database();

// 工具
const fmt = n => 'NT$' + Math.round(n).toLocaleString();
const mKey = d => d.slice(0,7);
const now = () => new Date().toISOString().slice(0,7);
const salary = () => parseInt(localStorage.getItem('budget_salary')) || 0;
const getArr = () => Object.entries(records).map(([id,r]) => ({...r, id}));
function genCode() { return Math.random().toString(36).substring(2,6).toUpperCase(); }

function showErr(msg) {
  document.querySelector('.spinner').style.display = 'none';
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('loading-err').textContent = msg;
  document.getElementById('loading-err').classList.remove('hidden');
  document.getElementById('loading-retry').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loading-screen').classList.add('hidden');
}

// 登入流程
function startSolo() {
  const name = document.getElementById('solo-name').value.trim() || '我';
  doSoloLogin(name);
}

function doSoloLogin(name) {
  userName = name; isMulti = false;
  localStorage.setItem('last_user_name', name);
  const key = 'solo_room_' + name;
  let rid = localStorage.getItem(key);
  if (!rid) { rid = 'solo_' + name + '_' + Date.now(); localStorage.setItem(key, rid); }
  roomId = rid;
  dbRef = db.ref('rooms/' + roomId + '/records');
  startListening();
  enterApp();
}

function stopListening() {
  if (dbRef) dbRef.off('value');
}
function startListening() {
  stopListening();
  dbRef.on('value', snap => {
    records = snap.val() || {};
    document.getElementById('sync-dot').className = 'sync-dot online';
    document.getElementById('sync-label').textContent = '已連線';
    updateAll();
  }, err => showErr('資料庫錯誤：' + err.message));
}

function enterApp() {
  hideLoading();
  document.getElementById('room-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('quick-fab').classList.remove('hidden');
  document.getElementById('room-badge').textContent = isMulti ? '房間 ' + roomId : '個人';
  const s = salary(); if (s) document.getElementById('salary-input').value = s;
  aMonth = now();
  document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);
  updateCatSelect(); renderQCats();
  document.getElementById('room-info-card').innerHTML = isMulti
    ? `房間代碼：<strong>${roomId}</strong><br>名字：${userName}`
    : `個人使用 · ${userName}`;
  history.replaceState({tab:'record'}, '', '');
}

// 自動登入
window.addEventListener('load', () => {
  const last = localStorage.getItem('last_user_name');
  if (last) {
    doSoloLogin(last);
  } else {
    hideLoading();
    document.getElementById('room-screen').classList.remove('hidden');
    // 嘗試抓上次名字填入
    const prev = localStorage.getItem('last_user_name');
    if (prev) document.getElementById('solo-name').value = prev;
  }
});

// 記帳
function setType(t) {
  curType = t;
  document.getElementById('btn-expense').className = 'type-btn' + (t==='expense'?' ae':'');
  document.getElementById('btn-income').className = 'type-btn' + (t==='income'?' ai':'');
  updateCatSelect();
}
function updateCatSelect() {
  document.getElementById('inp-cat').innerHTML = (curType==='expense'?ECATS:ICATS).map(c=>`<option>${c}</option>`).join('');
}
function addRecord() {
  const amount = parseFloat(document.getElementById('inp-amount').value);
  if (!amount || amount<=0) { alert('請輸入金額'); return; }
  const date = document.getElementById('inp-date').value;
  if (!date) { alert('請選擇日期'); return; }
  dbRef.push({ type:curType, amount, cat:document.getElementById('inp-cat').value, date, note:document.getElementById('inp-note').value.trim(), user:userName, ts:Date.now() });
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-note').value = '';
}
function deleteRecord(id) { db.ref('rooms/'+roomId+'/records/'+id).remove(); }

// 畫面更新
function renderSummary() {
  const m = now(), arr = getArr(), sal = salary();
  const mr = arr.filter(r=>mKey(r.date)===m);
  let inc = mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  let exp = mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  if (sal) inc = Math.max(inc, sal);
  const bal = inc - exp;
  document.getElementById('summary-metrics').innerHTML = `
    <div class="metric"><label>本月收入</label><div class="val green">${fmt(inc)}</div></div>
    <div class="metric"><label>本月支出</label><div class="val red">${fmt(exp)}</div></div>
    <div class="metric"><label>結餘</label><div class="val ${bal>=0?'green':'red'}">${fmt(bal)}</div></div>`;
}

function populateMonths() {
  const months = new Set(getArr().map(r=>mKey(r.date))); months.add(now());
  const sorted = Array.from(months).sort().reverse();
  const s = document.getElementById('filter-month'), cur = s.value || now();
  s.innerHTML = sorted.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m.replace('-','年')}月</option>`).join('');
}

function renderList() {
  const fm = document.getElementById('filter-month').value;
  const ft = document.getElementById('filter-type').value;
  let list = getArr().filter(r=>mKey(r.date)===fm);
  if (ft!=='all') list = list.filter(r=>r.type===ft);
  list.sort((a,b)=>b.date.localeCompare(a.date));
  const el = document.getElementById('record-list');
  if (!list.length) { el.innerHTML='<div class="empty">這個月沒有記錄</div>'; return; }
  el.innerHTML = list.map(r=>`
    <div class="record-item">
      <div class="rdot ${r.type}"></div>
      <div class="rinfo">
        <div class="name">${r.cat}${r.note?' · '+r.note:''}${isMulti?` <span style="font-size:10px;color:#FF8C42">${r.user}</span>`:''}</div>
        <div class="meta">${r.date}</div>
      </div>
      <div class="ramt ${r.type}">${r.type==='income'?'+':'-'}${fmt(r.amount)}</div>
      <button class="del-btn" onclick="deleteRecord('${r.id}')">✕</button>
    </div>`).join('');
}

function renderAnalysis() {
  const arr = getArr(), sal = salary(), m = aMonth;
  document.getElementById('analysis-month-label').textContent = m.replace('-','年')+'月';
  const mr = arr.filter(r=>mKey(r.date)===m);
  let inc = mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  let exp = mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  if (sal && m===now()) inc = Math.max(inc, sal);
  const bal = inc - exp, rate = inc>0?Math.round((bal/inc)*100):0;
  document.getElementById('analysis-metrics').innerHTML = `
    <div class="metric"><label>收入</label><div class="val green">${fmt(inc)}</div></div>
    <div class="metric"><label>支出</label><div class="val red">${fmt(exp)}</div></div>
    <div class="metric"><label>儲蓄率</label><div class="val ${rate>=0?'green':'red'}">${rate}%</div></div>`;
  renderBars('expense', mr, 'expense-bars');
  renderBars('income', mr, 'income-bars');
  renderTrend(arr, sal);
}

function renderBars(type, recs, elId) {
  const cats = {}; recs.filter(r=>r.type===type).forEach(r=>{cats[r.cat]=(cats[r.cat]||0)+r.amount;});
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const total = sorted.reduce((s,e)=>s+e[1],0);
  const el = document.getElementById(elId);
  if (!sorted.length) { el.innerHTML='<div class="empty" style="padding:.5rem">無記錄</div>'; return; }
  el.innerHTML = sorted.map(([c,a])=>`
    <div class="bar-row">
      <div class="bar-label">${c}</div>
      <div class="bar-wrap"><div class="bar-fill ${type}" style="width:${Math.round(a/total*100)}%"></div></div>
      <div class="bar-val">${fmt(a)}</div>
    </div>`).join('');
}

function renderTrend(arr, sal) {
  const months=[], d=new Date();
  for(let i=5;i>=0;i--){const x=new Date(d.getFullYear(),d.getMonth()-i,1);months.push(x.toISOString().slice(0,7));}
  const incs=months.map(m=>{let v=arr.filter(r=>r.type==='income'&&mKey(r.date)===m).reduce((s,r)=>s+r.amount,0);if(sal&&m===now())v=Math.max(v,sal);return v;});
  const exps=months.map(m=>arr.filter(r=>r.type==='expense'&&mKey(r.date)===m).reduce((s,r)=>s+r.amount,0));
  if(tChart)tChart.destroy();
  tChart=new Chart(document.getElementById('trend-chart'),{type:'line',data:{labels:months.map(m=>m.slice(5)+'月'),datasets:[
    {label:'收入',data:incs,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,.08)',tension:.3,pointRadius:4},
    {label:'支出',data:exps,borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,.08)',tension:.3,pointRadius:4}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{y:{ticks:{callback:v=>'NT$'+v.toLocaleString(),font:{size:10}},grid:{color:'rgba(0,0,0,.06)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
}

function renderSplit() {
  const el = document.getElementById('split-content');
  if (!isMulti) { el.innerHTML='<div class="empty">分帳功能需要建立多人房間</div>'; return; }
  const arr = getArr().filter(r=>mKey(r.date)===now()&&r.type==='expense');
  const users={};
  arr.forEach(r=>{users[r.user]=(users[r.user]||0)+r.amount;});
  const uList=Object.keys(users), total=Object.values(users).reduce((s,v)=>s+v,0), avg=uList.length?total/uList.length:0;
  const rows=uList.map(u=>`<div class="split-row"><span>${u}</span><span class="red">${fmt(users[u])}</span></div>`).join('');
  const results=[];
  uList.forEach(u=>{const d=users[u]-avg;if(d<-10)results.push(`${u} 應收 ${fmt(Math.abs(d))}`);else if(d>10)results.push(`${u} 應付 ${fmt(d)}`);});
  el.innerHTML=`
    <div class="card">
      <div class="sec-title">${now().replace('-','年')}月 共同支出</div>
      ${rows||'<div class="empty" style="padding:.5rem">無記錄</div>'}
      <div class="split-row"><span>總計</span><span style="font-weight:500">${fmt(total)}</span></div>
      <div class="split-row"><span>每人平均</span><span>${fmt(avg)}</span></div>
    </div>
    ${results.length?`<div class="split-result">💰 結算<br>${results.join('<br>')}</div>`:''}`;
}

function shiftMonth(d) {
  const dt=new Date(aMonth+'-01'); dt.setMonth(dt.getMonth()+d);
  aMonth=dt.toISOString().slice(0,7); renderAnalysis();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  TABS.forEach((n,i)=>{if(n===t)document.querySelectorAll('.tab')[i].classList.add('active');});
  if(t==='list'){populateMonths();renderList();}
  if(t==='analysis')renderAnalysis();
  if(t==='split')renderSplit();
  history.pushState({tab:t},'','');
}

function updateAll() {
  renderSummary();
  const a = document.querySelector('#main-app .section.active');
  if(!a) return;
  if(a.id==='tab-list'){populateMonths();renderList();}
  if(a.id==='tab-analysis')renderAnalysis();
  if(a.id==='tab-split')renderSplit();
}

// 選單
function openMenu() {
  document.getElementById('side-menu').classList.add('open');
  document.getElementById('menu-overlay').classList.add('open');
  document.getElementById('menu-status').innerHTML = isMulti
    ? `模式：多人<br>房間：<strong>${roomId}</strong><br>名字：${userName}`
    : `模式：個人<br>名字：${userName}`;
  document.getElementById('menu-leave-sec').classList.toggle('hidden', !isMulti);
  document.getElementById('menu-multi-sec').classList.toggle('hidden', isMulti);
  document.getElementById('menu-create-name').value = userName;
  document.getElementById('menu-join-name').value = userName;
}
function closeMenu() {
  document.getElementById('side-menu').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open');
}
function menuSwitchSolo() {
  const name = document.getElementById('menu-solo-name').value.trim();
  if (!name) { alert('請輸入帳本名稱'); return; }
  stopListening();
  records = {};
  closeMenu();
  doSoloLogin(name);
}
function menuCreateRoom() {
  const name = document.getElementById('menu-create-name').value.trim();
  if (!name) { alert('請輸入名字'); return; }
  stopListening();
  userName = name; isMulti = true; roomId = genCode();
  dbRef = db.ref('rooms/'+roomId+'/records');
  document.getElementById('room-badge').textContent = '房間 '+roomId;
  document.getElementById('room-info-card').innerHTML = `房間代碼：<strong>${roomId}</strong><br>名字：${userName}`;
  closeMenu();
  startListening();
  alert('房間建立成功！\n代碼：'+roomId+'\n把代碼分享給朋友加入');
}
function menuJoinRoom() {
  const name = document.getElementById('menu-join-name').value.trim();
  const code = document.getElementById('menu-join-code').value.trim().toUpperCase();
  if (!name||code.length!==4) { alert('請輸入名字和4碼代碼'); return; }
  stopListening();
  userName=name; isMulti=true; roomId=code;
  dbRef=db.ref('rooms/'+code+'/records');
  document.getElementById('room-badge').textContent='房間 '+roomId;
  document.getElementById('room-info-card').innerHTML=`房間代碼：<strong>${roomId}</strong><br>名字：${userName}`;
  closeMenu(); startListening();
}
function leaveRoom() {
  if (!isMulti) return;
  stopListening();
  records={};
  const name=userName;
  isMulti=false;
  closeMenu();
  doSoloLogin(name);
}
function saveSalary() { localStorage.setItem('budget_salary', parseInt(document.getElementById('salary-input').value)||0); }

// 快速記帳
function openQuick() {
  qCat='購物';
  document.getElementById('quick-amount').value='';
  renderQCats();
  document.getElementById('quick-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('quick-amount').focus(),100);
}
function closeQuick(e) { if(e.target===document.getElementById('quick-overlay'))document.getElementById('quick-overlay').classList.remove('open'); }
function renderQCats() {
  document.getElementById('quick-cats').innerHTML=ECATS.map(c=>`<button class="qcat ${c===qCat?'active':''}" onclick="selQCat('${c}')">${c}</button>`).join('');
}
function selQCat(c){qCat=c;renderQCats();}
function confirmQuick() {
  const amt=parseFloat(document.getElementById('quick-amount').value);
  if(!amt||amt<=0){alert('請輸入金額');return;}
  dbRef.push({type:'expense',amount:amt,cat:qCat,date:new Date().toISOString().slice(0,10),note:'',user:userName,ts:Date.now()});
  document.getElementById('quick-overlay').classList.remove('open');
}

// 返回鍵
window.addEventListener('popstate', e => {
  if (document.getElementById('side-menu').classList.contains('open')) { closeMenu(); history.pushState({},'',''); return; }
  if (document.getElementById('quick-overlay').classList.contains('open')) { document.getElementById('quick-overlay').classList.remove('open'); history.pushState({},'',''); return; }
  const prev = (e.state && e.state.tab) || 'record';
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+prev).classList.add('active');
  TABS.forEach((n,i)=>{if(n===prev)document.querySelectorAll('.tab')[i].classList.add('active');});
  if(prev==='list'){populateMonths();renderList();}
  if(prev==='analysis')renderAnalysis();
  if(prev==='split')renderSplit();
});
</script>
</body>
</html>
